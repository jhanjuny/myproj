
# RHEED Monitor 설정

camera:
  device_index: 0           # 카메라 인덱스 (0 = 첫 번째 발견된 카메라)
  exposure_us: 10000.0      # 노출 시간 (마이크로초) — 카메라에 맞게 조정
  gain_db: 0.0              # 게인 (dB)

detector:
  threshold_percentile: 95.0   # 밝기 상위 몇 % 이상을 스팟으로 볼지
  min_brightness: 20.0         # 이 값 미만이면 스팟 없음 (0~255)
  min_area: 4                  # 최소 스팟 픽셀 면적
  broad_area_threshold: 500    # 이 면적 이상이면 broad 패턴으로 분류
  max_spots: 10                # 최대 검출 스팟 수
  blur_ksize: 5                # Gaussian blur 커널 크기 (홀수)

screenshot_interval_sec: 30    # 자동 스크린샷 주기 (초) — UI에서 변경 가능

video_fps: 15                  # 녹화 영상 FPS
video_codec: mp4v              # 영상 코덱 (mp4v 또는 XVID)
